services:
  db:
    image: postgres:16-alpine
    container_name: kindred-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: kindred
      POSTGRES_PASSWORD: kindred_dev_pw
      POSTGRES_DB: kindred
    ports:
      - "5433:5432" # 5432 on host is taken by another local project
    volumes:
      - kindred_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kindred -d kindred"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  kindred_pgdata:
